<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
/>

<nav class="navbar navbar-expand-lg navbar-light fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#home">Samuel Kim</a>
    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleNavbar()"
      aria-controls="navbarNav"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div
      class="collapse navbar-collapse"
      [ngClass]="{ show: isNavbarCollapsed }"
    >
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link" href="#home" (click)="closeNavbar()">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#about" (click)="closeNavbar()">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#experience" (click)="closeNavbar()"
            >Experience</a
          >
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#projects" (click)="closeNavbar()"
            >Projects</a
          >
        </li>
      </ul>
      <button
        class="btn btn-outline-primary ms-2 dark-mode-toggle"
        (click)="toggleDarkMode()"
      >
        <i
          class="bi"
          [ngClass]="{ 'bi-moon-fill': !isDarkMode, 'bi-sun-fill': isDarkMode }"
        ></i>
      </button>
    </div>
  </div>
</nav>
